<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOPE SASA MD – Premium WhatsApp Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container glass fade-in">
    <div class="logo-section">
      <img src="https://files.catbox.moe/cebsbp.jpeg" alt="DOPE SASA MD Logo" class="bot-logo">
    </div>
    <h1>🤖 DOPE SASA MD</h1>
    <p class="tagline">Advanced WhatsApp Bot – 65+ Commands, AI, Auto Features</p>

    <div class="stats-grid">
      <div class="stat-card glass">
        <h3>⏱️ Uptime</h3>
        <p id="uptime">--</p>
      </div>
      <div class="stat-card glass">
        <h3>👥 Active Users</h3>
        <p id="users">--</p>
      </div>
      <div class="stat-card glass">
        <h3>⚡ Commands</h3>
        <p>65+</p>
      </div>
      <div class="stat-card glass">
        <h3>🟢 Status</h3>
        <p id="botStatus">Connecting...</p>
      </div>
    </div>

    <div class="nav-buttons">
      <a href="/pair" class="btn-primary">🔗 Connect Device</a>
      <a href="/how-to-connect" class="btn-secondary">📘 How to Connect</a>
      <a href="/contact" class="btn-secondary">📧 Contact</a>
      <a href="/faq" class="btn-secondary">❓ FAQ</a>
    </div>

    <footer class="footer">
      © 𝐏𝐎𝐖𝐄𝐑𝐃 𝐁𝐘 𝐃𝐎𝐏𝐄 𝐒𝐀𝐒𝐀 𝐌𝐃<br>
      <a href="https://dope-sasa-md.onrender.com" target="_blank">CONNECT BOT</a>
    </footer>
  </div>

  <div class="theme-toggle" onclick="toggleTheme()">
    🌓
  </div>

  <script src="app.js"></script>
</body>
</html>
